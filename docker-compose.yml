services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: registration-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD:-Your_password123}
      MSSQL_PID: Developer
    ports:
      - "14330:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -No -Q 'SELECT 1' -b -o /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: registration-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: src/Registration.Api/Dockerfile
    container_name: registration-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=RegistrationDb;User Id=sa;Password=${SA_PASSWORD:-Your_password123};TrustServerCertificate=True"
      RabbitMq__Host: rabbitmq
      RabbitMq__VirtualHost: /
      RabbitMq__Username: guest
      RabbitMq__Password: guest
      Outbox__PollingIntervalSeconds: "5"
      Outbox__BatchSize: "20"
      Email__SmtpHost: smtp.gmail.com
      Email__Port: "587"
      Email__FromAddress: ${EMAIL_FROM_ADDRESS:-}
      Email__FromDisplayName: Registration Module
      Email__Username: ${EMAIL_USERNAME:-}
      Email__Password: ${EMAIL_PASSWORD:-}
    # Note: the frontend container runs on host port 8080, so the API is published on 8081 to avoid a conflict.
    ports:
      - "8081:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver-data:
